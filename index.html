<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Epifanía del Café</title>
  <meta name="theme-color" content="#030303">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <div class="bg-effects" aria-hidden="true" id="bgEffects"></div>

    <section class="container">
      <header class="header">
        <h1>EPIFANÍA DEL CAFÉ</h1>
        <div class="rule"></div>
      </header>

      <section class="grid" id="gridCartas"></section>
    </section>
  </main>

  <div class="modal-root" id="modalRoot" aria-hidden="true">
    <button class="modal-backdrop" id="modalBackdrop" aria-label="Cerrar modal"></button>

    <div class="modal-frame" id="modalFrame" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-panel">
        <button class="close-button" id="closeButton" aria-label="Cerrar">×</button>

        <div class="modal-grid">
          <div class="modal-visual">
            <div class="modal-card animate-in" id="modalCard">
              <div class="modal-card-inner" id="modalCardInner">
                <div class="modal-card-face modal-card-back">
                  <img src="dorso.jpg" alt="Dorso de la carta" class="modal-card-image" id="modalBackImage">
                </div>
                <div class="modal-card-face modal-card-front" id="modalCardFront"></div>
              </div>
            </div>
          </div>

          <div class="modal-copy" id="modalCopy">
            <p class="modal-roman" id="modalRoman"></p>
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-rule"></div>
            <p class="modal-text" id="modalText"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
